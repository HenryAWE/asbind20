# Testing asbind20 with the latest WIP version of AngelScript

name: Nightly

on:
  push:
    paths-ignore:
      - 'doc/**'
      - README.*
  pull_request:
    paths-ignore:
      - 'doc/**'
      - README.*
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC

jobs:
    ClangNightly:
      runs-on: ubuntu-24.04
      strategy:
          fail-fast: false
          matrix:
            cxxstd: [20, 23]

      name: Linux x64 Clang 19 C++${{matrix.cxxstd}}

      steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build clang-19 clang++-19
            sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-19 100
            sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-19 100

      - name: Install AngelScript WIP
        working-directory: ${{github.workspace}}/ci
        run: ./setup_angelscript.sh --version latest

      - name: Configure
        run: >
          cmake
          -S ${{github.workspace}}
          -B build
          -G Ninja
          -Dasbind_cxxstd=${{matrix.cxxstd}}
          -DCMAKE_BUILD_TYPE=Release
          -Dasbind_build_test=1
          -Dasbind_build_bench=1

      - name: Build
        run: cmake --build ${{github.workspace}}/build

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest --output-on-failure

      - name: Benchmark
        working-directory: ${{github.workspace}}/build/bench
        run: ${{github.workspace}}/ci/run_benchmarks.sh
